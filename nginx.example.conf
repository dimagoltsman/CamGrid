# Example nginx reverse proxy for CamGrid.
# Key points: proxy the WebSocket upgrade (go2rtc streams) and forward the real client
# IP + scheme so per-IP lockout works and the session cookie is marked Secure.
#
# NOTE: WebRTC media does NOT go through nginx. Behind a proxy, streams use the MSE path
# (works fine here). To enable low-latency WebRTC, forward :8555 (TCP+UDP) to the CamGrid
# host directly and set WEBRTC_CANDIDATE — see the README.

# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# CamGrid backend. If nginx runs on the same host, use 127.0.0.1:<WEB_PORT>.
# If it runs on a different box, use the CamGrid host's LAN IP:<WEB_PORT>.
upstream camgrid {
    server 127.0.0.1:3000;
}

server {
    listen 443 ssl http2;
    server_name cameras.example.com;

    ssl_certificate     /etc/letsencrypt/live/cameras.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cameras.example.com/privkey.pem;

    # Camera add/probe payloads are tiny; bump only if you ever need it.
    client_max_body_size 16m;

    location ^~ / {
        proxy_pass http://camgrid;
        proxy_http_version 1.1;

        # Real client IP + scheme (per-IP lockout + Secure session cookie depend on these)
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (required for go2rtc WebRTC signaling / MSE streams)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;

        # Don't buffer the live streams; allow long-lived connections
        proxy_buffering off;
        proxy_read_timeout 3600s;

        proxy_redirect off;
        proxy_ssl_session_reuse off;
    }
}

# Plain HTTP -> HTTPS (and ACME challenge for certbot renewals)
server {
    listen 80;
    server_name cameras.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
