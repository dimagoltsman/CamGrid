# Example nginx reverse proxy for camgrid.
# Key points: proxy WebSocket upgrades (go2rtc streams) and forward the real client
# IP + scheme so per-IP lockout and Secure cookies work correctly.

# (optional) websocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name cameras.example.com;

    ssl_certificate     /etc/letsencrypt/live/cameras.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cameras.example.com/privkey.pem;

    # Streams can be large/long-lived.
    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:3000;

        # WebSocket upgrade (required for go2rtc WebRTC/MSE streams)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Real client IP + scheme (per-IP lockout + Secure cookie depend on these)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't buffer the live streams
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}

# Plain HTTP -> HTTPS
server {
    listen 80;
    server_name cameras.example.com;
    return 301 https://$host$request_uri;
}
