<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CamGrid — Sign in</title>
  <style>
    :root { --bg:#0b0c0e; --panel:#16181c; --line:#262a31; --text:#e7e9ee; --muted:#8b909a; --accent:#3b82f6; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font:14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #15171c, var(--bg)); color:var(--text);
    }
    .card { width:min(92vw,360px); background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:28px; }
    .logo { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .logo svg { width:26px; height:26px; color:var(--accent); }
    h1 { font-size:20px; margin:0; }
    p.sub { color:var(--muted); margin:4px 0 20px; font-size:13px; }
    label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
    input {
      width:100%; background:var(--bg); border:1px solid var(--line); border-radius:9px;
      padding:11px 12px; color:var(--text); font-size:15px; margin-bottom:14px;
    }
    input:focus { outline:none; border-color:var(--accent); }
    button {
      width:100%; background:var(--accent); color:#fff; border:none; border-radius:9px;
      padding:12px; font-size:15px; font-weight:600; cursor:pointer;
    }
    button:disabled { opacity:.6; cursor:default; }
    .err { color:var(--danger); font-size:13px; min-height:18px; margin:12px 0 0; text-align:center; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      <h1>CamGrid</h1>
    </div>
    <p class="sub">Sign in to view your cameras.</p>
    <label for="u">Username</label>
    <input id="u" name="username" autocomplete="username" autofocus required />
    <label for="p">Password</label>
    <input id="p" name="password" type="password" autocomplete="current-password" required />
    <button id="btn" type="submit">Sign in</button>
    <p class="err" id="err"></p>
  </form>
  <script>
    const form = document.getElementById('form');
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: form.username.value, password: form.password.value }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) { location.href = '/'; return; }
        err.textContent = data.error || 'Sign in failed'
          + (data.attemptsLeft != null ? ` (${data.attemptsLeft} attempt${data.attemptsLeft === 1 ? '' : 's'} left)` : '');
      } catch {
        err.textContent = 'Network error';
      } finally {
        btn.disabled = false; btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
